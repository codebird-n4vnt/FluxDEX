[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 1
via_ir = true
evm_version = "paris"

# Remappings to match the imports in Uniswap's source code
remappings = [
    "@uniswap/v3-core/=lib/v3-core/",
    "@uniswap/v3-periphery/=lib/v3-periphery/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[rpc_endpoints]
somniaTestnet = "https://dream-rpc.somnia.network"