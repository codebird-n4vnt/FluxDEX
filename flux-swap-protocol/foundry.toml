[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "london"
solc_version = "0.8.19"
auto_detect_solc = false

# Ignore pinned solc versions in dependencies
ignored_error_codes = ["license", "pragma-solidity"]

[profile.default.optimizer_details]
yul = true

# Remappings to match the imports in Uniswap's source code
remappings = [
    "@uniswap/v3-core/=lib/v3-core/",
    "@uniswap/v3-periphery/=lib/v3-periphery/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[rpc_endpoints]
somnia = "https://api.infra.testnet.somnia.network"